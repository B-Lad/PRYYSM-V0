<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <style>
      .layer { fill: none; stroke: #ffc107; stroke-width: 6; stroke-linejoin: round; stroke-linecap: round; }
    </style>
  </defs>

  <!-- Layer Stack Icon -->
  <g transform="translate(0, 5)">
    <!-- Top diamond -->
    <path class="layer" d="M 15 35 L 50 15 L 85 35 L 50 55 Z" />
    
    <!-- Middle curve -->
    <path class="layer" d="M 15 55 L 50 75 L 85 55" />
    
    <!-- Bottom curve -->
    <path class="layer" d="M 15 75 L 50 95 L 85 75" />
  </g>
</svg>