<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 100" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@500;800;900&amp;display=swap');
      .logo-text { font-family: 'Inter', Arial, sans-serif; font-weight: 900; font-size: 46px; fill: #ffffff; letter-spacing: -0.5px; }
      .sub-text { font-family: 'Inter', Arial, sans-serif; font-weight: 500; font-size: 18px; fill: #cbd5e1; }
      .layer { fill: none; stroke: #ffc107; stroke-width: 6; stroke-linejoin: round; stroke-linecap: round; }
    </style>
  </defs>

  <!-- Layer Stack Icon -->
  <g transform="scale(0.8) translate(10, 10)">
    <!-- Top diamond -->
    <path class="layer" d="M 15 35 L 50 15 L 85 35 L 50 55 Z" />
    
    <!-- Middle curve -->
    <path class="layer" d="M 15 55 L 50 75 L 85 55" />
    
    <!-- Bottom curve -->
    <path class="layer" d="M 15 75 L 50 95 L 85 75" />
  </g>

  <!-- Text -->
  <text x="110" y="65" class="logo-text">Pryysm</text>
  <text x="285" y="63" class="sub-text">by 3D Prodigy</text>
</svg>
